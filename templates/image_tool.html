{% extends "base.html" %}

{% block title %}Image Generator{% endblock %}

{% block content %}
<style>
    /* Styles specific to this form for a better layout */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
    }
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
    }
    input[type="text"],
    input[type="number"],
    textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-sizing: border-box;
        font-size: 16px;
        font-family: sans-serif;
    }
    textarea {
        height: 100px;
        resize: vertical;
    }
    button[type="submit"] {
        background-color: #5a4fcf;
        color: white;
        border: none;
        padding: 15px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
    }
    button[type="submit"]:hover {
        background-color: #4a3fbf;
    }
</style>

<h1>🖼️ Image Generator</h1>
<form action="/image-tool" method="post" enctype="multipart/form-data">
    <div class="form-grid">
        <div>
            <label for="style_prompt">Style Description:</label>
            <textarea id="style_prompt" name="style_prompt" required>{{ style_prompt }}</textarea>
        </div>
        <div>
            <label for="object_prompt">Object to Create:</label>
            <input type="text" id="object_prompt" name="object_prompt" placeholder="e.g., a vintage armchair" required>
        </div>
        <div>
            <label for="num_images">Number of Images:</label>
            <input type="number" id="num_images" name="num_images" min="1" max="4" value="1" required>
        </div>
    </div>
    <button type="submit" style="margin-top: 30px;">Generate Images</button>
</form>
<p style="text-align:center; margin-top:20px;"><a href="/">🏠 Back to Main Menu</a></p>

{% endblock %}
