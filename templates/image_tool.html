<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Generator</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; width: 100%; max-width: 800px; } /* Increased width for gallery */
        h1 { color: #5a4fcf; text-align: center; }
        label { display: block; margin-top: 20px; font-weight: bold; }
        input, textarea, button, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; font-family: sans-serif; font-size: 16px; }
        textarea { height: 100px; resize: vertical; }
        button { background-color: #5a4fcf; color: white; border: none; font-size: 16px; cursor: pointer; transition: background-color 0.3s; margin-top: 30px; }
        button:hover { background-color: #4a3fbf; }
        .result-box { margin-top: 30px; text-align: center; }
        .result-box h2 { color: #333; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; /* Increased gap */
            margin-top: 15px;
        }
        .gallery .image-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .gallery .image-container {
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .gallery img { 
            width: 100%; 
            display: block;
        }
        /* --- NEW: Action Buttons --- */
        .action-buttons {
            padding: 10px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            gap: 8px;
        }
        .action-buttons a {
            text-decoration: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            transition: opacity 0.3s;
        }
        .action-buttons a:hover {
            opacity: 0.8;
        }
        .animate-btn { background-color: #007bff; }
        .threed-btn { background-color: #6f42c1; }

    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Generator</h1>
        <form action="/image-tool" method="post" enctype="multipart/form-data">
            
            <label for="style_prompt">Style Description:</label>
            <textarea id="style_prompt" name="style_prompt" required>{{ style_prompt }}</textarea>
            
            <label for="object_prompt">Object to Create:</label>
            <input type="text" id="object_prompt" name="object_prompt" placeholder="e.g., a vintage armchair" required>

            <label for="num_images">Number of Images:</label>
            <input type="number" id="num_images" name="num_images" min="1" max="4" value="1" required>

            <button type="submit">Generate Images</button>
        </form>

        {% if image_urls %}
        <div class="result-box">
            <h2>Generated Images:</h2>
            <p>Choose an image to continue the workflow.</p>
            <div class="gallery">
                {% for url in image_urls %}
                <div class="image-card">
                    <div class="image-container">
                        <img src="{{ url }}" alt="Generated Image">
                    </div>
                    <!-- Add the action buttons below each image -->
                    <div class="action-buttons">
                        <a href="/animate-image?image_url={{ url | urlencode }}" class="animate-btn">🎬 Animate with Kling</a>
                        <a href="/create-3d?image_url={{ url | urlencode }}" class="threed-btn">🧊 Create 3D Model</a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
