{% extends "base.html" %}

{% block title %}Style Analyzer{% endblock %}

{% block content %}
<style>
    /* Styles specific to this form for a better layout */
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
    input[type="file"], textarea {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ddd;
        box-sizing: border-box;
        font-size: 16px;
        font-family: sans-serif;
    }
    textarea { height: 100px; resize: vertical; }
    button[type="submit"] {
        background-color: #5a4fcf;
        color: white;
        border: none;
        padding: 15px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
        margin-top: 20px;
    }
    button[type="submit"]:hover { background-color: #4a3fbf; }
</style>

<h1>🎨 Style Analyzer</h1>
<form action="/style-tool" method="post" enctype="multipart/form-data">
    
    <div>
        <label for="image">Upload Image:</label>
        <input type="file" id="image" name="image" accept="image/*" required>
    </div>
    
    <div style="margin-top: 20px;">
        <label for="prompt">Your Question for the AI Expert:</label>
        <!-- The user prompt is simplified as the main instructions are now in the backend -->
        <textarea id="prompt" name="prompt" required>Describe the style of this image.</textarea>
    </div>
    
    <button type="submit">Analyze Style</button>
</form>
<p style="text-align:center; margin-top:20px;"><a href="/">🏠 Back to Main Menu</a></p>
{% endblock %}
