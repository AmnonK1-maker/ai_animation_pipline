<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Analyzer</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; width: 100%; max-width: 500px; }
        h1 { color: #5a4fcf; text-align: center; }
        label { display: block; margin-top: 20px; font-weight: bold; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; font-family: sans-serif; font-size: 16px; }
        textarea { height: 120px; resize: vertical; }
        button { background-color: #5a4fcf; color: white; border: none; font-size: 16px; cursor: pointer; transition: background-color 0.3s; margin-top: 30px; }
        button:hover { background-color: #4a3fbf; }
        .result-box { margin-top: 30px; }
        .result-box h2 { color: #333; }
        .result-box p { background-color: #f9f9f9; border-left: 5px solid #5a4fcf; padding: 15px; border-radius: 5px; line-height: 1.6; }
        /* Style for our new button */
        .cta-button { display: inline-block; text-align: center; background-color: #28a745; color: white; text-decoration: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; margin-top: 15px; transition: background-color 0.3s; }
        .cta-button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Style Analyzer</h1>
        <form action="/style-tool" method="post" enctype="multipart/form-data">
            
            <label for="image">Upload Image:</label>
            <input type="file" id="image" name="image" accept="image/*" required>
            
            <label for="prompt">Your Question for the AI:</label>
            <textarea id="prompt" name="prompt" required>In 2-3 sentences, describe the artistic style of this image. Focus on the technique, mood, and genre, not the specific objects in the image.</textarea>
            
            <button type="submit">Analyze Style</button>
        </form>

        {% if analysis_text %}
        <div class="result-box">
            <h2>Analysis Result:</h2>
            <p>{{ analysis_text }}</p>

            <a href="/image-tool?style_prompt={{ analysis_text | urlencode }}" class="cta-button">
                ➡️ Use this Style to Generate an Image
            </a>
            </div>
        {% endif %}
    </div>
</body>
</html>
