<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workflow App</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #5a4fcf; }
        .tool-link { display: block; background-color: #5a4fcf; color: white; padding: 15px 30px; margin-top: 20px; text-decoration: none; border-radius: 5px; font-size: 18px; transition: background-color 0.3s; }
        .tool-link:hover { background-color: #4a3fbf; }
        .library-link { background-color: #6c757d; } /* A different color for the library */
        .library-link:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Workflow App</h1>
        <p>Choose a tool to get started.</p>
        <a href="/style-tool" class="tool-link">🎨 Style Analyzer</a>
        <a href="/image-tool" class="tool-link">🖼️ Image Generator</a>
        <a href="/video-tool" class="tool-link">🎬 Video Generator (from file)</a>
        <a href="/library" class="tool-link library-link">📚 Image Library</a>
    </div>
</body>
</html>
