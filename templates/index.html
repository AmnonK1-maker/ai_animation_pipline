{% extends "base.html" %}

{% block title %}AI Workflow App{% endblock %}

{% block content %}
    <style>
        /* Styles specific to the homepage links */
        .tool-link { display: block; background-color: #5a4fcf; color: white; padding: 15px 30px; margin-top: 20px; text-decoration: none; border-radius: 5px; font-size: 18px; transition: background-color 0.3s; text-align: center; }
        .tool-link:hover { background-color: #4a3fbf; }
        .library-link { background-color: #6c757d; }
        .library-link:hover { background-color: #5a6268; }
    </style>
    
    <div style="text-align: center;">
        <h1>AI Workflow App</h1>
        <p>Choose a tool to get started.</p>
        <a href="/style-tool" class="tool-link">🎨 Style Analyzer</a>
        <a href="/image-tool" class="tool-link">🖼️ Image Generator</a>
        <a href="/video-tool" class="tool-link">🎬 Video Generator (from file)</a>
        <a href="/library" class="tool-link library-link">📚 Image Library</a>
    </div>
{% endblock %}
