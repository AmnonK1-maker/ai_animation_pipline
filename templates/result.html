<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Generated Video</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 80%; }
        h1 { color: #5a4fcf; }
        video { max-width: 100%; border-radius: 8px; margin-top: 20px; }
        .action-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .action-buttons a {
            text-decoration: none;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .approve-btn { background-color: #28a745; }
        .approve-btn:hover { background-color: #218838; }
        .regenerate-btn { background-color: #ffc107; color: #212529;}
        .regenerate-btn:hover { background-color: #e0a800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Animation Ready for Review</h1>
        <video controls autoplay loop>
            <source src="{{ video_path }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="action-buttons">
            <!-- FIX: Convert the dictionary back to a JSON string for the URL -->
            <a href="/approve-animation?video_path={{ video_path | urlencode }}&hidden_data={{ hidden_data | tojson | urlencode }}" class="approve-btn">✔️ Approve</a>
            
            <!-- FIX: Access the dictionary key directly -->
            {% if not is_from_upload %}
            <a href="/animate-image?image_url={{ hidden_data.original_image_url | urlencode }}" class="regenerate-btn">🔄 Regenerate</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
