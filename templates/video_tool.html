{% extends "base.html" %}

{% block title %}Video Generator (from file){% endblock %}

{% block content %}
        <h1>🎬 Video Generator (from file)</h1>
        <form action="/generate-video" method="post" enctype="multipart/form-data">
            
            <label for="image">Start & End Frame Image:</label>
            <input type="file" id="image" name="image" accept="image/*" required>
            
            <label for="prompt">Prompt:</label>
            <input type="text" id="prompt" name="prompt" value="A seamless loop animation of..." required>

            <input type="hidden" name="aspect_ratio" value="1:1">

            <label for="duration">Duration (seconds):</label>
            <select id="duration" name="duration">
                <option value="5">5 seconds</option>
                <option value="10">10 seconds</option>
            </select>
            
            <button type="submit">Generate Video</button>
        </form>
        <p style="text-align:center; margin-top:20px;"><a href="/">🏠 Back to Main Menu</a></p>
{% endblock %}
