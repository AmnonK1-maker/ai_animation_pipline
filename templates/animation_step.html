<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animate Image</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; width: 100%; max-width: 500px; }
        h1 { color: #5a4fcf; text-align: center; }
        label { display: block; margin-top: 20px; font-weight: bold; }
        input, textarea, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; font-family: sans-serif; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; font-size: 16px; cursor: pointer; transition: background-color 0.3s; margin-top: 30px; }
        button:hover { background-color: #0069d9; }
        .image-preview { text-align: center; margin-bottom: 20px; }
        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Animate Your Image</h1>
        <div class="image-preview">
            <p>Your selected image:</p>
            <img src="{{ image_url }}" alt="Selected image for animation">
        </div>
        <form action="/generate-animation" method="post">
            <input type="hidden" name="image_url" value="{{ image_url }}">
            
            <label for="prompt">Animation Prompt:</label>
            <textarea id="prompt" name="prompt" required>A subtle animation, bringing the image to life.</textarea>
            
            <label for="background_color">Background Color:</label>
            <select id="background_color" name="background_color">
                <option value="green">Green Screen</option>
                <option value="blue">Blue Screen</option>
            </select>

            <!-- NEW: Movement Selection -->
            <label for="movement">Movement Type:</label>
            <select id="movement" name="movement">
                <option value="none">None</option>
                <option value="float">Float (Wiggle)</option>
                <option value="turntable">Turntable (Spin)</option>
            </select>

            <label for="aspect_ratio">Aspect Ratio:</label>
            <select id="aspect_ratio" name="aspect_ratio">
                <option value="1:1">1:1 (Square)</option>
                <option value="16:9">16:9 (Widescreen)</option>
                <option value="9:16">9:16 (Vertical)</option>
            </select>

            <label for="duration">Duration (seconds):</label>
            <select id="duration" name="duration">
                <option value="5">5 seconds</option>
                <option value="10">10 seconds</option>
            </select>
            
            <button type="submit">Generate Animation</button>
        </form>
    </div>
</body>
</html>
