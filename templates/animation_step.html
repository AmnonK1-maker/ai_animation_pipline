
    {% extends "base.html" %}

{% block title %}Animate Your Image{% endblock %}

{% block content %}
    
   
        <h1>🎬 Animate Your Image</h1>
        <div class="image-preview">
            <p>Your selected image:</p>
            <img src="{{ image_url }}" alt="Selected image for animation">
        </div>
        <form action="/generate-animation" method="post">
            <input type="hidden" name="image_url" value="{{ image_url }}">
            
            <label for="prompt">Animation Prompt:</label>
            <textarea id="prompt" name="prompt" required>A subtle animation, bringing the image to life.</textarea>
            
            <label for="background_color">Background Color:</label>
            <select id="background_color" name="background_color">
                <option value="green">Green Screen</option>
                <option value="blue">Blue Screen</option>
            </select>

            <!-- NEW: Movement Selection -->
            <label for="movement">Movement Type:</label>
            <select id="movement" name="movement">
                <option value="none">None</option>
                <option value="float">Float (Wiggle)</option>
                <option value="turntable">Turntable (Spin)</option>
            </select>

            <label for="aspect_ratio">Aspect Ratio:</label>
            <select id="aspect_ratio" name="aspect_ratio">
                <option value="1:1">1:1 (Square)</option>
                <option value="16:9">16:9 (Widescreen)</option>
                <option value="9:16">9:16 (Vertical)</option>
            </select>

            <label for="duration">Duration (seconds):</label>
            <select id="duration" name="duration">
                <option value="5">5 seconds</option>
                <option value="10">10 seconds</option>
            </select>
            
            <button type="submit">Generate Animation</button>
        </form>
         <p style="text-align:center; margin-top:20px;"><a href="/">🏠 Back to Main Menu</a></p>
{% endblock %}
